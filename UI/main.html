[% INCLUDE "ui-header.html" %]
<body id="app-main"
      class="lsmb [% dojo_theme %]">
  <div id="main" data-dojo-type="lsmb/main" style="width:100%;height:100%">
  <div id="console-container"
       data-dojo-type="dijit/layout/BorderContainer"
       data-dojo-props="persist: true"
       style="width: 100%; height: 100%">
    <div id="maindiv" class="mainpanel"
         data-dojo-type="lsmb/MainContentPane"
         data-dojo-props="region: 'center', href:'welcome.html'">
    </div>
    <div id="menudiv" class="edgePanel"
         style="width:30ex"
         data-dojo-type="dijit/layout/ContentPane"
         data-dojo-props="region: 'left', splitter: true, minSize: 200">
      <div style="text-align: center"><a target="_blank" rel="noopener noreferrer"
                                         href="http://ledgersmb.org/">
          <img class="cornerlogo" src="images/ledgersmb_small-trans.png"
               width="100" height="50" style="border:1px" alt="LedgerSMB" />
        </a>
      </div>
      <div id="version_info">[% text("LedgerSMB [_1]", version) %]</div>
      <table id="header_info" class="header_table">
        <tr>
          <td id="login_info_header" class="header_left">
            [% text("User") %]
          </td>
          <td id="company_info_header"
              class="header_right">
            [% text("Company") %]
          </td>
        </tr>
        <tr>
          <td id="login_info" class="header_left">[% login %]</td>
          <td id="company_info" class="header_right">[% company %]</td>
        </tr>
      </table>
      <hr>

        <div style="text-align: center"><a target="_blank" rel="noopener noreferrer"
                                           href="http://ledgersmb.org/">
            <img class="cornerlogo" src="images/ledgersmb_small-trans.png"
                 width="100" height="50" style="border:1px" alt="LedgerSMB" />
          </a>
        </div>
        <div id="version_info"><?lsmb text("LedgerSMB [_1]", version) ?></div>
        <table id="header_info" class="header_table">
          <tr>
            <td id="login_info_header" class="header_left">
              <?lsmb text("User") ?>
            </td>
            <td id="company_info_header"
                class="header_right">
              <?lsmb text("Company") ?>
            </td>
          </tr>
          <tr>
            <td id="login_info" class="header_left"><?lsmb login ?></td>
            <td id="company_info" class="header_right"><?lsmb company ?></td>
          </tr>
        </table>
        <hr>

        <dojo-menu-tree id="top_menu"></dojo-menu-tree>
      </dojo-content-pane>

    </dojo-border-container>
    <dojo-dialog id="errorDialog" title="An error occurred!"
                 style="display:none;min-width:40ex"></dojo-dialog>
  </div>
  <script>
    require(['DojoMenuTree', 'DojoDeclarativeContent', 'DojoContentPane',
             'DojoBorderContainer', 'DojoDialog'
    ],
    function(DojoMenuTree, DojoDeclarativeContent, DojoContentPane,
             DojoBorderContainer, DojoDialog
    ) {
    var router = new VueRouter({ routes: [
    { path: '*', component: DojoDeclarativeContent }
    ] });
    router.afterEach(function() {
    console.log('afterEach');
    });

    var app = new Vue({ el: '#app', data: {}, router: router,
    components: { 'dojo-dialog': DojoDialog,
    'dojo-border-container': DojoBorderContainer,
    'dojo-content-pane': DojoContentPane } });
    });
  </script>
</body>
[% end_html %]
